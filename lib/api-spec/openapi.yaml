openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scamshield
    description: ScamShield AI scam analysis operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect on success or failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /scamshield/analyze:
    post:
      operationId: analyzeContent
      tags: [scamshield]
      summary: Analyze text/URL/QR content for scam indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scamshield/emergency:
    post:
      operationId: getEmergencyActions
      tags: [scamshield]
      summary: Get immediate recovery actions after clicking a scam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmergencyInput"
      responses:
        "200":
          description: Emergency action plan generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scamshield/history:
    get:
      operationId: getAnalysisHistory
      tags: [scamshield]
      summary: Get recent analysis history
      responses:
        "200":
          description: List of recent analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisRecord"

  /scamshield/stats:
    get:
      operationId: getScamStats
      tags: [scamshield]
      summary: Get scam detection statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScamStats"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    AnalyzeInput:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1

    EmergencyInput:
      type: object
      required:
        - exposures
      properties:
        scamContext:
          type: string
          description: Optional description of the scam encountered
        exposures:
          type: array
          items:
            type: string
          description: List of what was exposed (e.g. "otp", "bank_details", "installed_app", "scanned_qr", "sent_money", "shared_password", "clicked_link")

    EmergencyAction:
      type: object
      required:
        - priority
        - title
        - description
        - timeframe
      properties:
        priority:
          type: string
          enum: [immediate, urgent, soon]
        title:
          type: string
        description:
          type: string
        timeframe:
          type: string

    EmergencyResponse:
      type: object
      required:
        - severity
        - summary
        - actions
        - hotlines
      properties:
        severity:
          type: string
          enum: [moderate, serious, critical]
        summary:
          type: string
        actions:
          type: array
          items:
            $ref: "#/components/schemas/EmergencyAction"
        hotlines:
          type: array
          items:
            type: string

    EducationalTechnique:
      type: object
      required:
        - name
        - detected
        - explanation
      properties:
        name:
          type: string
        detected:
          type: boolean
        explanation:
          type: string

    EducationMode:
      type: object
      required:
        - techniques
        - whyThisMatters
      properties:
        techniques:
          type: array
          items:
            $ref: "#/components/schemas/EducationalTechnique"
        whyThisMatters:
          type: string

    AnalysisResult:
      type: object
      required:
        - type
        - riskLevel
        - confidenceScore
        - reasoning
        - recommendedActions
        - preventionTips
        - eli15
        - educationMode
        - vulnerableGroups
        - scammerStrategy
      properties:
        type:
          type: string
        riskLevel:
          type: string
          enum: [Low, Medium, High, Critical]
        confidenceScore:
          type: number
        reasoning:
          type: array
          items:
            type: string
        recommendedActions:
          type: array
          items:
            type: string
        preventionTips:
          type: array
          items:
            type: string
        eli15:
          type: string
        educationMode:
          $ref: "#/components/schemas/EducationMode"
        vulnerableGroups:
          type: array
          items:
            type: string
        scammerStrategy:
          type: array
          items:
            type: string
        urlIntelligence:
          $ref: "#/components/schemas/UrlIntelligence"

    UrlIntelligence:
      type: object
      required:
        - isUrl
        - domain
        - threatScore
        - possibleTyposquatting
        - usesUrlShortener
        - suspiciousKeywords
        - recommendation
      properties:
        isUrl:
          type: boolean
        domain:
          type: string
        threatScore:
          type: number
        possibleTyposquatting:
          type: boolean
        typosquattingTarget:
          type: string
        usesUrlShortener:
          type: boolean
        suspiciousKeywords:
          type: array
          items:
            type: string
        recommendation:
          type: string

    AnalysisRecord:
      type: object
      required:
        - id
        - contentSnippet
        - riskLevel
        - scamType
        - confidenceScore
        - analyzedAt
      properties:
        id:
          type: integer
        contentSnippet:
          type: string
        riskLevel:
          type: string
          enum: [Low, Medium, High, Critical]
        scamType:
          type: string
        confidenceScore:
          type: number
        analyzedAt:
          type: string

    ScamStats:
      type: object
      required:
        - totalAnalyzed
        - byRiskLevel
        - byType
        - averageConfidence
      properties:
        totalAnalyzed:
          type: integer
        byRiskLevel:
          type: object
          additionalProperties:
            type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
        averageConfidence:
          type: number
