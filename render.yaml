services:
  # API Server
  - type: web
    name: scam-shield-api
    env: node
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && cd artifacts/api-server && pnpm install && pnpm run build
    startCommand: cd artifacts/api-server && node dist/index.mjs
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: GOOGLE_GEMINI_API_KEY
        sync: false